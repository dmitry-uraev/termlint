name: Termlint Tests & Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-termlint-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Test Termlint PR (py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache Poetry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: poetry-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install Poetry
        run: |
          pipx install poetry
          poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --with dev --extras base --no-interaction

      - name: Run tests with coverage
        run: poetry run pytest tests  --cov=termlint --cov-report=xml --cov-report=term

      - name: Upload Coverage
        if: false # disable for now
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  test-termlint-full:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Test Termlint Full (py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache Poetry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: poetry-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install Poetry
        run: |
          pipx install poetry
          poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --with dev --extras base --no-interaction

      - name: Run tests with coverage
        run: poetry run pytest tests  --cov=termlint --cov-report=xml --cov-report=term

      - name: Upload Coverage
        if: false # disable for now
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
